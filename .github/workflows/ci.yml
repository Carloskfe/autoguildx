name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Lint Web
        run: npm run lint --workspace=apps/web

      - name: Test API
        run: npm run test --workspace=apps/api -- --forceExit

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: autoguildx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Run E2E tests
        run: npm run test:e2e --workspace=apps/api
        env:
          TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/autoguildx_test
          JWT_SECRET: ci-e2e-secret
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=packages/shared

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
